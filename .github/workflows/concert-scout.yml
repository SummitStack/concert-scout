name: Concert Scout

on:
  schedule:
    - cron: '0 1 * * 3'   # Tuesday 9PM EDT (1AM UTC Wed)
    - cron: '0 1 * * 5'   # Thursday 9PM EDT (1AM UTC Fri)
    - cron: '0 13 * * 6'  # Saturday 8AM EDT (1PM UTC Sat)
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-httplib2 google-api-python-client

      - name: Run concert scout
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python checker.py

      - name: Commit seen events
        run: |
          git config user.name "concert-scout"
          git config user.email "actions@github.com"
          git add seen_events.json
          git diff --staged --quiet || git commit -m "Update seen events"
          git push
